name: DeployIQ Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Index repository code
        env:
          DEPLOYIQ_API_URL: ${{ secrets.DEPLOYIQ_API_URL }}
          DEPLOYIQ_API_KEY: ${{ secrets.DEPLOYIQ_API_KEY }}
          REPO_FULL_NAME: ${{ github.repository }}
        run: |
          FILES_JSON=$(find . -type f \
            \( -name "*.ts" -o -name "*.tsx" -o -name "*.js" -o -name "*.jsx" \
               -o -name "*.py" -o -name "*.go" -o -name "*.rs" -o -name "*.java" \
               -o -name "*.rb" -o -name "*.yml" -o -name "*.yaml" \) \
            ! -path "*/node_modules/*" ! -path "*/.next/*" ! -path "*/dist/*" \
            ! -path "*/.git/*" ! -path "*/build/*" ! -path "*/__pycache__/*" \
            | head -200 \
            | while read -r file; do
                content=$(head -500 "$file")
                jq -n --arg path "$file" --arg content "$content" '{path: $path, content: $content}'
              done | jq -s '.')
          curl -s -X POST "${DEPLOYIQ_API_URL}/api/index-repo" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${DEPLOYIQ_API_KEY}" \
            -d "$(jq -n --arg repo "$REPO_FULL_NAME" --argjson files "$FILES_JSON" '{repoFullName: $repo, files: $files}')" || true

      - name: Extract PR diff
        id: diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}

          # Get the diff
          gh pr diff "$PR_NUMBER" > /tmp/pr.diff

          # Get changed file list
          gh pr view "$PR_NUMBER" --json files --jq '.files[].path' > /tmp/changed-files.txt

      - name: Call DeployIQ Review API
        id: review
        env:
          DEPLOYIQ_API_URL: ${{ secrets.DEPLOYIQ_API_URL }}
          DEPLOYIQ_API_KEY: ${{ secrets.DEPLOYIQ_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
          PR_HEAD: ${{ github.event.pull_request.head.ref }}
          REPO_FULL_NAME: ${{ github.repository }}
        run: |
          # Build changed files JSON array
          CHANGED_FILES=$(jq -R -s 'split("\n") | map(select(. != ""))' /tmp/changed-files.txt)

          # Build JSON payload safely using jq with env vars
          # jq reads env vars directly, avoiding shell interpolation issues
          PAYLOAD=$(jq -n \
            --arg repoFullName "$REPO_FULL_NAME" \
            --argjson prNumber "$PR_NUMBER" \
            --arg prTitle "$PR_TITLE" \
            --arg prBody "$PR_BODY" \
            --rawfile diff /tmp/pr.diff \
            --argjson changedFiles "$CHANGED_FILES" \
            --arg baseBranch "$PR_BASE" \
            --arg headBranch "$PR_HEAD" \
            '{
              repoFullName: $repoFullName,
              prNumber: $prNumber,
              prTitle: $prTitle,
              prBody: $prBody,
              diff: $diff,
              changedFiles: $changedFiles,
              baseBranch: $baseBranch,
              headBranch: $headBranch
            }')

          # Call the API
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "${DEPLOYIQ_API_URL}/api/review" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${DEPLOYIQ_API_KEY}" \
            -d "$PAYLOAD")

          # Extract HTTP status code and body
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" != "200" ]; then
            echo "API returned HTTP $HTTP_CODE"
            echo "$BODY"
            exit 1
          fi

          # Extract review body for the PR comment
          echo "$BODY" | jq -r '.review.reviewBody' > /tmp/review-body.md

      - name: Post review as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reviewBody = fs.readFileSync('/tmp/review-body.md', 'utf8');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: reviewBody
            });
