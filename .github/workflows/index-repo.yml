name: DeployIQ Index Repository

on:
  workflow_dispatch: # Manual trigger only

permissions:
  contents: read

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Collect source files and send to DeployIQ
        env:
          DEPLOYIQ_API_URL: ${{ secrets.DEPLOYIQ_API_URL }}
          DEPLOYIQ_API_KEY: ${{ secrets.DEPLOYIQ_API_KEY }}
        run: |
          # Collect tracked TS/TSX/JS/JSON/YAML/Dockerfile files deterministically
          FILES_JSON=$(git ls-files | grep -E '\.(ts|tsx|js|jsx|json|yml|yaml)$|(^|/)Dockerfile$' | while read -r file; do
            CONTENT=$(cat "$file" | jq -Rs .)
            echo "{\"path\": \"${file}\", \"content\": $CONTENT}"
          done | jq -s '.')

          PAYLOAD=$(jq -n \
            --arg repoFullName "${{ github.repository }}" \
            --argjson files "$FILES_JSON" \
            '{ repoFullName: $repoFullName, files: $files }')

          curl -s -X POST "${DEPLOYIQ_API_URL}/api/index-repo" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${DEPLOYIQ_API_KEY}" \
            -d "$PAYLOAD"
