services:
  chroma:
    image: ${CHROMA_IMAGE:-chromadb/chroma}
    restart: unless-stopped
    volumes:
      - chroma-data:/chroma/chroma
    expose:
      - "8000"

  deployiq:
    image: ${DEPLOYIQ_IMAGE_URI:?DEPLOYIQ_IMAGE_URI must be set in compose.env}
    restart: unless-stopped
    depends_on:
      chroma:
        condition: service_started
    env_file:
      - ./deployiq.env
    environment:
      HOSTNAME: 0.0.0.0
      PORT: "3000"
    ports:
      - "${DEPLOYIQ_BIND_ADDRESS:-127.0.0.1}:${DEPLOYIQ_HOST_PORT:-3001}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3000/api/review >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s

volumes:
  chroma-data:
